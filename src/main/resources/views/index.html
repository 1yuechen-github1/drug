  <script th:src="@{/static/res/layui/layui.js}"></script>
  <script th:inline="javascript">
    /*<![CDATA[*/
    layui.config({
      base: /*[[@{/static/res/}]]*/ ''
    }).use(['index']);
    /*]]>*/
  //   点击左侧菜单栏处理逻辑
    layui.use(['element'], function() {
      var element = layui.element;

      // 监听导航链接点击事件
      element.on('nav(layadmin-system-side-menu)', function(elem) {
        var layHref = elem.attr('lay-href');
        var layId = layHref.replace(/[^\w]/g, ''); // 生成唯一的 lay-id

        // 判断标签是否已存在
        var isExist = false;
        var tabs = document.querySelectorAll('#LAY_app_tabsheader li');
        tabs.forEach(function(tab) {
          if (tab.getAttribute('lay-id') === layId) {
            isExist = true;
            return;
          }
        });

        if (!isExist) {
          // 生成页面标签并添加
          var title = elem.find('cite').text();
          var tabHtml = '<li lay-id="' + layId + '" lay-attr="' + layHref + '">' + title + '</li>';
          document.querySelector('#LAY_app_tabsheader').insertAdjacentHTML('beforeend', tabHtml);
        }

        // 切换到对应的标签页
        element.tabChange('layadmin-layout-tabs', layId);
      });
    });

  </script>

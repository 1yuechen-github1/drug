<!DOCTYPE html>
<html lang="zh_CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>患者列表</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/static/res/layui/css/layui.css}" media="all">
  <link rel="stylesheet" th:href="@{/static/res/adminui/dist/css/admin.css}" media="all">
</head>
<body>

<div class="layui-fluid">
  <div class="layui-card">

    <div class="layui-card-body" >
      <table id="LAY-user-manage" lay-filter="LAY-user-manage"></table>
      <script type="text/html" id="toolbarDemo">
        <div class="layui-inline" style="margin-right: 10px;">
            <span class="layui-btn layui-btn-sm" lay-event="add">
            <i class="layui-icon">&#xe654;</i><span class="icon-text">添加</span>
            </span>
        </div>

      </script>
      <script type="text/html" id="barDemo">
        <div class="layui-clear-space">
        <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
        </div>
      </script>
    </div>
  </div>
</div>

</script>
<script th:src="@{/static/res/layui/layui.js}"></script>
<script>
  layui.use(['table','form'],function () {
    var $ = layui.$;
    var table = layui.table;
    var form = layui.form;
    table.render({
      elem: '#LAY-user-manage',
      url: '/admin/userQueryPage',
      method: 'POST',
      page: true,
      limit: 17, // 修改默认条数为18
      limits: [10, 17, 30, 40, 50],
      id: 'table-load',
      toolbar: '#toolbarDemo',
      cols: [
        [
          {title: '序号', templet: '#indexTpl', width: 60, align: 'center'},
          {field: 'username', title: '账户名', align: 'center', width: 300},
          {field: 'password', title: '账户密码', align: 'center', width: 300},
          {field: 'telephone', title: '联系电话', align: 'center', width: 300},
          {field: 'email', title: '邮箱', align: 'center', width: 300},
          {field: 'doctorname', title: '医生姓名', align: 'center', width: 300},
          {title: '操作', align: 'center', toolbar: '#barDemo', fixed: 'right'}
        ]
      ]
    });
    //监听搜索栏事件
    //监听头工具栏事件
    table.on('toolbar(LAY-user-manage)',function (obj) {
      switch (obj.event) {
        case 'add':
          layer.open({
            type: 2,
            title: '添加',
            content: '/admin/userArchiving',
            shade:[0.8,'#393d49'],
            area:['30%','45%'],
            btn:['确定','取消'],
            yes:function (index,layero) {
              var iframeWindow = window['layui-layer-iframe'+index];
              var submit = layero.find('iframe').contents().find("#LAY-front-submit");
              //监听提交
              iframeWindow.layui.form.on('submit(LAY-front-submit)',function (data) {
                var field = data.field;
                $.ajax({
                  url: '/admin/userAdd',
                  data: field,
                  async: false,
                  cache: false,
                  success: function (str) {
                    if(str.code === 0){
                      table.reload('table-load');
                    }
                    layer.msg(str.msg,{icon:str.icon,anim:str.anim});
                  }
                });
                layer.close(index);     //关闭弹层
              });
              submit.trigger('click');
            },
            success:function (layero,index) {

            }
          });
          break;
      }
    });


    //监听编辑、删除,查询患者问诊记录
    table.on('tool(LAY-user-manage)',function (obj) {
      console.log(obj.data); // 查看当前行的数据对象内容
      var data = obj.data;
      switch (obj.event) {
        case 'edit':
          console.log(obj.data); // 查看当前行的数据对象内容
          var id = data.id;
          var url = '/patientManagement/medicalRecord?id='+id;
          // window.open(url);
          window.location.href = url;
          break;
        case 'del':
          layer.confirm('确认要删除吗？',function (index) {
            $.ajax({
              url: '/supplier/supplierDelById?id=' +data.id,
              data: null,
              async: false,
              cache: false,
              success: function (str) {
                table.reload('table-load');
                layer.msg(str.msg,{icon:str.icon,anim:str.anim});
              }
            });
          })
          break;
      }
    });
  });

</script>
</body>
</html>

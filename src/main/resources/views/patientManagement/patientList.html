<!DOCTYPE html>
<html lang="zh_CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>患者列表</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/static/res/layui/css/layui.css}" media="all">
  <link rel="stylesheet" th:href="@{/static/res/adminui/dist/css/admin.css}" media="all">
</head>
<body>

  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-form layui-card-header layuiadmin-card-header-auto">
        <div class="layui-form-item">
          <div class="layui-inline">
            <label class="layui-form-label">姓名</label>
            <div class="layui-input-block">
              <input type="text" name="patientname" placeholder="请输入" autocomplete="off" class="layui-input">
            </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">身份证</label>
            <div class="layui-input-block">
              <input type="text" name="idcard" placeholder="请输入" autocomplete="off" class="layui-input">
            </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">联系电话</label>
            <div class="layui-input-block">
              <input type="text" name="birthday" placeholder="请输入" autocomplete="off" class="layui-input">
            </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">病历号</label>
            <div class="layui-input-block">
              <input type="text" name="hospitalcode" placeholder="请输入" autocomplete="off" class="layui-input">
            </div>
          </div>
          <div class="layui-inline">
            <button class="layui-btn layuiadmin-btn-useradmin" lay-submit lay-filter="LAY-user-front-search">
              <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
            </button>
          </div>
        </div>
      </div>
      
      <div class="layui-card-body" >
        <table id="LAY-user-manage" lay-filter="LAY-user-manage"></table>
        <script type="text/html" id="toolbarDemo">
          <div class="layui-inline" style="margin-right: 10px;">
            <span class="layui-btn layui-btn-sm" lay-event="add">
            <i class="layui-icon">&#xe654;</i><span class="icon-text">患者建档</span>
            </span>
          </div>
<!--          <div class="layui-inline" style="margin-right: 10px;">
            <span class="layui-btn layui-btn-sm" lay-event="appointment">
            <i class="layui-icon">&#xe654;</i><span class="icon-text">患者预约</span>
            </span>
          </div>-->

<!--          <div class="layui-inline" style="margin-right: 10px;">
            <span class="layui-btn layui-btn-sm" lay-event="test">
            <i class="layui-icon">&#xe654;</i><span class="icon-text">合并就诊记录测试</span>
            </span>
          </div>-->
        </script>


        <script type="text/html" id="barDemo">
          <div class="layui-clear-space">
          <a class="layui-btn layui-btn-xs" lay-event="select">查看</a>
            <a class="layui-btn layui-btn-xs" lay-event="merge">合并交班记录</a>
          <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
          </div>
        </script>

      </div>
    </div>
  </div>

  </script>
  <script th:src="@{/static/res/layui/layui.js}"></script>
  <script>
    layui.use(['table','form'],function () {
      var $ = layui.$;
      var table = layui.table;
      var form = layui.form;
      table.render({
        elem: '#LAY-user-manage',
        url: '/patientManagement/patientQueryPage',
        method: 'POST',
        page: true,
        limit: 17, // 修改默认条数为18
        limits: [10, 17, 30, 40, 50],
        id: 'table-load',
        toolbar: '#toolbarDemo',
        cols: [
          [
            {field: 'id', title: 'id', hide: true},
            {field: 'patientname', title: '患者姓名', align: 'center', width: 200},
            {field: 'idcard', title: '患者身份证', align: 'center', width: 200},
            {field: 'sex', title: '患者性别', align: 'center', width: 200},
            {field: 'birthday', title: '联系电话', align: 'center', width: 200},
            {field: 'hospitalcode', title: '病历号', align: 'center', width: 200},
            {field: 'patientdoctor', title: '负责医生', align: 'center', width: 200},
            {field: 'patientlabel', title: '特殊患者标签', align: 'center', width: 200},
            {title: '操作', align: 'center', toolbar: '#barDemo', fixed: 'right',minWidth: 125}
          ]
        ],
/*        initSort: { // 设置初始排序
          field: 'id', // 字段名
          type: 'desc' // 降序
        },*/
      });
      //监听搜索栏事件
      //事件-搜索
      form.on('submit(LAY-user-front-search)', function(data){
        var field = data.field;

        //执行重载
        table.reload('table-load', {
          where: {
            patientname: field.patientname,
            idcard: field.idcard,
            birthday:field.birthday,
            hospitalcode:field.hospitalcode
          }
        });
      });
      //监听头工具栏事件
      table.on('toolbar(LAY-user-manage)',function (obj) {
        switch (obj.event) {
          case 'add':
            layer.open({
              type: 2,
              title: '患者建档',
              content: '/patientManagement/patientArchiving',
              shade:[0.8,'#393d49'],
              area: ['30%', '75%'], // 设置宽度和高度为屏幕的80%
              btn:['确定','取消'],
              maxmin: true,
              yes:function (index,layero) {
                var iframeWindow = window['layui-layer-iframe'+index];
                var submit = layero.find('iframe').contents().find("#LAY-front-submit");
                //监听提交
                iframeWindow.layui.form.on('submit(LAY-front-submit)',function (data) {
                  var field = data.field;
                  $.ajax({
                    url: '/patientManagement/patientAdd',
                    data: field,
                    async: false,
                    cache: false,
                    success: function (str) {
                      if(str.code === 0){
                        table.reload('table-load');
                      }
                      layer.msg(str.msg,{icon:str.icon,anim:str.anim});
                    }
                  });
                  layer.close(index);     //关闭弹层
                });
                submit.trigger('click');
              },
              success:function (layero,index) {

              }
            });
            break;
          case 'appointment':
            var appointmentUrl = '/patientManagement/patientAppointment'; // Replace with the actual URL of the appointment page
            $.ajax({
              url: appointmentUrl,
              success: function (html) {
                $('.layui-card').html(html); // Replace the content of the card body with the appointment page content
              }
            });
            break;
          case 'test':
            var appointmentUrl = '/patientManagement/patientRecordMergeTest'; // Replace with the actual URL of the appointment page
            $.ajax({
              url: appointmentUrl,
              success: function (html) {
                $('.layui-card').html(html); // Replace the content of the card body with the appointment page content
              }
            });
            break;

        }
      });


      //监听编辑、删除,查询患者问诊记录
      table.on('tool(LAY-user-manage)',function (obj) {
        console.log(obj.data); // 查看当前行的数据对象内容
        var data = obj.data;
        switch (obj.event) {
          case 'select':
            console.log(obj.data); // 查看当前行的数据对象内容
            var id = data.id;
            var url = '/patientManagement/patientEditByPatientId?patientId='+id;
            // window.open(url);
            window.location.href = url;
            break;
          case 'merge':
            console.log(obj.data); // 查看当前行的数据对象内容
            var id = data.id;
            var url = '/patientManagement/patientRecordMerge?patientId='+id;
            // window.open(url);
            window.location.href = url;
            break;
          case 'del':
            layer.confirm('确认要删除吗？',function (index) {
              $.ajax({
                url: '/supplier/supplierDelById?id=' +data.id,
                data: null,
                async: false,
                cache: false,
                success: function (str) {
                  table.reload('table-load');
                  layer.msg(str.msg,{icon:str.icon,anim:str.anim});
                }
              });
            })
            break;
        }
      });
    });

  </script>
</body>
</html>

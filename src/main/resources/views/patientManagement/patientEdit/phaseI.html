<!--日期渲染器-->
<script>
    var seletedDate;
  layui.use('laydate', function() {
    var laydate = layui.laydate;
    // 设置出生年月输入框的laydate
    laydate.render({
      elem: '#birthdate-input',
      type: 'date',
      trigger: 'click',  // 设置触发方式为点击文本
      done: function(value, date, endDate) {
          seletedDate = value; // 将选择的日期值存储在全局变量中
        }
      //theme: '#393d49'
      // 如果需要，可以添加更多选项
    });


  });
</script>
<!--填写表单提交部分-->
<script>

    layui.use(['form'], function () {
        var form = layui.form;
        var $ = layui.$;

        // 监听提交按钮的点击事件
        form.on('submit(patientEditBasic)', function (data) {
            // 阻止表单的默认提交行为
            var event = window.event || arguments.callee.caller.arguments[0];
            event.preventDefault();

            // 检查日期是否被选择
            if (typeof seletedDate === 'undefined') {
                layer.msg('日期不可为空', {icon: 5});
                return false;
            }
            if (edit.getContent() === '') {
                layer.msg('交班记录不可为空', {icon: 5});
                return false;
            }
            // 主表单和关联子表单列表们
            var handoverRecord = {};
            var zhongzhiList = [];
            var zhiguList = [];
            var ruanzuzhiList = [];
            var chongxiList = [];
            var chaixianList = [];
            // 拼接种植子表单列表
            // TODO:程序效率低，调研先进方法
            for (var i = 1; i <= zhongzhiIdx; i++) {
                var zhongzhiTooth = data.field['zhongzhiTooth_' + i];
                var immediateRestoration = data.field['immediateRestoration_' + i];
                var boneType = data.field['boneType_' + i];
                var gingivaThickness = data.field['gingivaThickness_' + i];
                var implantSystem = data.field['implantSystem_' + i];
                var implantType = data.field['implantType_' + i];
                var implantDiameter = data.field['implantDiameter_' + i];
                var implantLenght = data.field['implantLenght_' + i];
                var implantationTorque = data.field['implantationTorque_' + i];
                var healingMode = data.field['healingMode_' + i];
                var healingAbutmentType = data.field['healingAbutmentType_' + i];
                var healingAbutmentDiameter = data.field['healingAbutmentDiameter_' + i];
                var healingAbutmentLength = data.field['healingAbutmentLength_' + i];
                var guidePlate = data.field['guidePlate_' + i];
                var guidePlateCompany = data.field['guidePlateCompany_' + i];
                var guidePlatePrintingDate = data.field['guidePlatePrintingDate_' + i];
                var guidePlateUsingDate = data.field['guidePlateUsingDate_' + i];
                var guidePlatePosition = data.field['guidePlatePosition_' + i];
                var guidePlateProtocol = data.field['guidePlateProtocol_' + i];
                var guidePlateCBCT = data.field['guidePlateCBCT_' + i];
                var guidePlateType = data.field['guidePlateType_' + i];
                var guidePlateUsingType = data.field['guidePlateUsingType_' + i];
                var guidePlateBarehanded = data.field['guidePlateBarehanded_' + i];
                var guideSpecial = data.field['guideSpecial_' + i];

                var zhongzhiItem = {
                    zhongzhiTooth: zhongzhiTooth,
                    immediateRestoration: immediateRestoration,
                    boneType: boneType,
                    gingivaThickness: gingivaThickness,
                    implantSystem: implantSystem,
                    implantType: implantType,
                    implantDiameter: implantDiameter,
                    implantLenght: implantLenght,
                    implantationTorque: implantationTorque,
                    healingMode: healingMode,
                    healingAbutmentType: healingAbutmentType,
                    healingAbutmentDiameter: healingAbutmentDiameter,
                    healingAbutmentLength: healingAbutmentLength,
                    guidePlate: guidePlate,
                    guidePlateCompany: guidePlateCompany,
                    guidePlatePrintingDate: guidePlatePrintingDate,
                    guidePlateUsingDate: guidePlateUsingDate,
                    guidePlatePosition: guidePlatePosition,
                    guidePlateProtocol: guidePlateProtocol,
                    guidePlateCBCT: guidePlateCBCT,
                    guidePlateType: guidePlateType,
                    guidePlateUsingType: guidePlateUsingType,
                    guidePlateBarehanded: guidePlateBarehanded,
                    guideSpecial: guideSpecial
                };

                zhongzhiList.push(zhongzhiItem);
            }
            // 拼接植骨子表单列表
            for (var i = 1; i <= zhiguIdx; i++) {
                var zhiguTooth = data.field['zhiguTooth_' + i];
                var zhiguBoneType = data.field['zhiguBoneType_' + i];
                var graftingMethod = data.field['graftingMethod_' + i];
                var graftingWeight = data.field['graftingWeight_' + i];
                var graftingMaterial = data.field['graftingMaterial_' + i];
                var barrierMembrane = data.field['barrierMembrane_' + i];
                var membraneLength = data.field['membraneLength_' + i];
                var membraneWidth = data.field['membraneWidth_' + i];
                var membraneSystem = data.field['membraneSystem_' + i];

                var zhiguItem = {
                    zhiguTooth: zhiguTooth,
                    zhiguBoneType: zhiguBoneType,
                    graftingMethod: graftingMethod,
                    graftingWeight: graftingWeight,
                    graftingMaterial: graftingMaterial,
                    barrierMembrane: barrierMembrane,
                    membraneLength: membraneLength,
                    membraneWidth: membraneWidth,
                    membraneSystem: membraneSystem
                };

                zhiguList.push(zhiguItem);
            }
            // 拼接软组织子表单列表
            for (var i = 1; i <= ruanzuzhiIdx; i++) {
                var yizhiTooth = data.field['yizhiTooth_' + i];
                var yizhiMethod = data.field['yizhiMethod_' + i];

                var yizhiItem = {
                    yizhiTooth: yizhiTooth,
                    yizhiMethod: yizhiMethod
                };

                ruanzuzhiList.push(yizhiItem);
            }
            // 拼接冲洗子表单列表
            for (var i = 1; i <= chongxiIdx; i++) {
                var chongxiTooth = data.field['chongxiTooth_' + i];
                var chongxiHealingCondition = data.field['chongxiHealingCondition_' + i];

                var chongxiItem = {
                    chongxiTooth: chongxiTooth,
                    chongxiHealingCondition: chongxiHealingCondition
                };

                chongxiList.push(chongxiItem);
            }
            // 拼接拆线子表单列表
            for (var i = 1; i <= chaixianIdx; i++) {
                var chaixianTooth = data.field['chaixianTooth_' + i];
                var chaixianHealingCondition = data.field['chaixianHealingCondition_' + i];

                var chaixianItem = {
                    chaixianTooth: chaixianTooth,
                    chaixianHealingCondition: chaixianHealingCondition
                };

                chaixianList.push(chaixianItem);
            }
            // 拼接发送到后端的数据
            handoverRecord = {
                record: edit.getContent(),
                doctorName: data.field["iDoctor"],
                recordDate: seletedDate,
                patientId: [[${patientId}]],
                stage: "phaseI",
                zhongzhiList: zhongzhiList,
                zhiguList: zhiguList,
                ruanzuzhiList: ruanzuzhiList,
                chongxiList: chongxiList,
                chaixianList: chaixianList
            }


            $.ajax({
                url: '/patientManagement/handoverRecordEdit',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(handoverRecord),
                success: function (str) {
                    layer.msg(str.msg,{icon:str.icon,anim:str.anim});
                },
                error: function (xhr, status, error) {
                    console.error(error);
                }
            });
        });
    });
</script>

    function createFormElement(labelText, name, verify = null, value = "") {
        var div = document.createElement("div");
        div.className = "layui-form-item";
        var inputGroup = document.createElement("div");
        inputGroup.className = "layui-input-group";
        var inputPrefix = document.createElement("div");
        inputPrefix.className = "layui-input-prefix";
        inputPrefix.textContent = labelText;

        var input = document.createElement("input");
        input.type = "text";
        input.name = name;
        if (verify) {
            input.setAttribute("lay-verify", verify);
        }
        input.placeholder = "";
        input.setAttribute("autocomplete", "off");
        input.className = "layui-input";
        input.value = value; // Set the initial value

        inputGroup.appendChild(inputPrefix);
        inputGroup.appendChild(input);
        div.appendChild(inputGroup);

        return div;
    }



    function addDynamicForm(data, recordDate) {


        var formId = "dynamic-form-" + data.id;
        // Create a button to show/hide the form
        var toggleButton = document.createElement("button");
        toggleButton.textContent = data.recordDate;
        toggleButton.style.marginLeft = "30px"; // 设置按钮的左外边距为30px
        toggleButton.style.marginBottom = "15px"; // 设置按钮的左外边距为30px
        toggleButton.addEventListener("click", function () {
            toggleFormVisibility(formId);
        });

        // Append the toggle button to the form-container
        var formContainer = document.getElementById("form-container");
        formContainer.appendChild(toggleButton);

        // Create the form div and set its attributes
        var newForm = document.createElement("div");
        newForm.id = formId;
        newForm.style.display = "none"; // Initially hide the form
        // 如果携带日期参数则显示该日期的交班记录
        if (recordDate && recordDate == data.recordDate) {
            newForm.style.display = "block";
        }
        // 创建一个新的表单元素
        //var newForm = document.createElement("form");
        newForm.classList.add("layui-form"); // 添加Layui的表单类，以便使用Layui的样式和验证

        // 创建深色分割线
        var separatorLine = document.createElement("hr");
        separatorLine.classList.add("layui-border-black"); // 添加Layui的深色分割线类

        // 创建输入框：日期
        var dateInputDiv = document.createElement("div");
        dateInputDiv.classList.add("layui-input-group", "layui-form-item");
        dateInputDiv.style.paddingLeft = "30px"; // 设置左侧内边距

        // 创建日期标签的前缀
        var dateLabelPrefix = document.createElement("div");
        dateLabelPrefix.classList.add("layui-input-prefix");
        dateLabelPrefix.textContent = "日期";

        var dateInput = document.createElement("input");
        dateInput.type = "text";
        dateInput.name = "recordDate";
        dateInput.value = data.recordDate;
        dateInput.id = "birthdate-input";
        dateInput.classList.add("layui-input");
        //dateInput.id = "date-input" + data.id; // 使用唯一的ID以区分不同表单项
        dateInputDiv.appendChild(dateLabelPrefix);
        dateInputDiv.appendChild(dateInput);

        newForm.appendChild(dateInputDiv);

        // 创建输入框：操作医生
        var doctorInputDiv = document.createElement("div");
        doctorInputDiv.classList.add("layui-input-group", "layui-form-item");
        doctorInputDiv.style.paddingLeft = "30px"; // 设置左侧内边距

        // 创建操作医生标签
        var doctorPrefix = document.createElement("div");
        doctorPrefix.classList.add("layui-input-prefix");
        doctorPrefix.textContent = "操作医生";

        var doctorInput = document.createElement("input");
        doctorInput.type = "text";
        doctorInput.name = "doctorName";
        doctorInput.value = data.doctorName;
        doctorInput.id = "doctor-input" + data.id;
        doctorInput.classList.add("layui-input");

        doctorInputDiv.appendChild(doctorPrefix);
        doctorInputDiv.appendChild(doctorInput);

        newForm.appendChild(doctorInputDiv);

        // 创建文本框：交班记录
        var recordTextareaDiv = document.createElement("div");
        recordTextareaDiv.classList.add("layui-form-item");

        var recordTextareaLabel = document.createElement("label");
        recordTextareaLabel.classList.add("layui-form-label");
        recordTextareaLabel.textContent = "交班记录";
        recordTextareaDiv.appendChild(recordTextareaLabel);

        var recordTextareaBlock = document.createElement("div");
        recordTextareaBlock.classList.add("layui-input-block");

        var recordTextarea = document.createElement("textarea");
        recordTextarea.name = "record";
        recordTextarea.value = data.record;
        recordTextarea.id = "record-input" + data.id;
        recordTextarea.classList.add("layui-textarea");
        recordTextareaBlock.appendChild(recordTextarea);

        recordTextareaDiv.appendChild(recordTextareaBlock);

        newForm.appendChild(recordTextareaDiv);

        // 遍历数据并动态生成表单
        for (var i = 0; i < data.procedures.length; i++) {
            switch (data.procedures[i].type){
                case "zhongzhi":
                    var zhongzhiForm = createZhongzhiForm(data.procedures[i]);
                    newForm.appendChild(zhongzhiForm);
                    break;
                case "zhigu":
                    var zhiguForm = createZhiguForm(data.procedures[i]);
                    newForm.appendChild(zhiguForm);
                    break;
                case "ruanzuzhiyizhi":
                    var ruanzuzhiyizhiForm = createRuanzuzhiForm(data.procedures[i]);
                    newForm.appendChild(ruanzuzhiyizhiForm);
                    break;
                case "chongxi":
                    var chongxiForm = createChongxiForm(data.procedures[i]);
                    newForm.appendChild(chongxiForm);
                    break;
                case "chaixian":
                    var chaixianForm = createChaixianForm(data.procedures[i]);
                    newForm.appendChild(chaixianForm);
                    break;

            }
        }

        //提交按钮
        var submitButton = document.createElement("button");
        submitButton.textContent = "提交";
        submitButton.classList.add("layui-btn");
        submitButton.setAttribute("lay-submit", "");
        submitButton.setAttribute("lay-filter", "submitForm");
        submitButton.style.marginLeft = "30px"; // 设置按钮的左外边距为30px
        submitButton.addEventListener("click", function () {
            submitForm(formId);
        });

        newForm.appendChild(submitButton);

        //在表单结尾添加分割线
        newForm.appendChild(separatorLine);


        // 最后，将新表单添加到页面中
        //var formContainer = document.getElementById("form-container");
        formContainer.appendChild(newForm);

        layui.extend({
            tinymce: '/static/layui_exts/tinymce/tinymce'
        }).use(['tinymce', 'util', 'layer'], function () {
            var t = layui.tinymce
                , util = layui.util
                , layer = layui.layer
                , $ = layui.$

            var textareaId = "record-input" + data.id;

            var edit = t.render({
                elem: "#"+textareaId,
                height: 300,
                menubar: false, // 禁用菜单栏
                toolbar:'undo redo | forecolor backcolor bold italic underline strikethrough | indent2em alignleft aligncenter alignright    | link bullist numlist   | formatselect  fontsizeselect',
                // 其余配置可参考官方文档
            },function(opt,edit){
                //加载完成后回调
            });



        });

    }

<script>
    layui.use(function (){
        var $ = layui.$;
        $.ajax({
            url: '/patientManagement/handoverRecord' + "?patientId=" + [[${patientId}]] + "&stage=phaseI",
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                console.log(data);
                var serverData = [];
                var cnt = 1;
                data['data'].forEach(function (item) {
                    cnt++;

                   var arr = [];
                   item['zhongzhiList'].forEach(function (zhongzhi) {
                       zhongzhi['type'] = "zhongzhi";
                       arr.push(zhongzhi);
                   });
                   item['zhiguList'].forEach(function (zhigu) {
                       zhigu['type'] = "zhigu";
                       arr.push(zhigu);
                   });
                   item['ruanzuzhiList'].forEach(function (ruanzuzhi) {
                       ruanzuzhi['type'] = "ruanzuzhiyizhi";
                       arr.push(ruanzuzhi);
                   });
                    item['chongxiList'].forEach(function (chongxi) {
                        chongxi['type'] = "chongxi";
                        arr.push(chongxi);
                    });
                   item['chaixianList'].forEach(function (chaixian) {
                       chaixian['type'] = "chaixian";
                       arr.push(chaixian);
                   });
                    var record = {
                        id: cnt,
                        recordDate: item['recordDate'],
                        doctorName: item['doctorName'],
                        record: item['record'],
                        procedures: arr
                    } ;
                   serverData.push(record);
                });
                // 遍历数据并动态生成表单
                for (var i = 0; i < serverData.length; i++) {
                    addDynamicForm(serverData[i], '[[${recordDate}]]');
                }
            },
            error: function (error) {
                console.error(error);
            }
        });
    });


</script>

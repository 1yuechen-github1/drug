<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>谈方案</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/static/res/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/static/res/adminui/dist/css/admin.css}" media="all">
    <style>
        .layui-card {
            width: 100%; /* 设置卡片宽度为100% */
            height: 100vh; /* 设置卡片高度为视口高度 */
            margin: 0; /* 可以移除卡片的外边距，以确保充满整个页面 */
            padding: 0; /* 可以移除卡片的内边距，以确保充满整个页面 */
            box-sizing: border-box; /* 让边框和内边距计算在卡片的宽度和高度内 */
        }

        #form-container {
            background-color: #ffffff; /* 设置背景颜色为白色 */
            padding: 20px; /* 可选，添加内边距以增加容器内部的填充 */
        }
    </style>
</head>
<body>

<div id="form-container"></div>

  <div class="layui-card">
    <div class="layui-card-body" style="padding: 15px;">
      <form class="layui-form" action="" lay-filter="component-form-group">
        <input name="id" id="id-input" class="layui-input layui-hide" th:value="${plan?.id}"/>
        <input name="medicalrecordid" id="id-input2" class="layui-input layui-hide" th:value="${plan?.medicalRecordId}"/>


          <div class="layui-form-item " style="padding-left: 30px">
              <div class="layui-input-group">
                  <div class="layui-input-prefix" >
                      日期
                  </div>
                  <input type="text" name="recordDate"  placeholder="请选择日期" autocomplete="off" class="layui-input" id="birthdate-input">
              </div>
          </div>

          <div class="layui-form-item" style="padding-left: 30px">
              <div class="layui-input-group">
                  <div class="layui-input-prefix" >
                      操作医生
                  </div>
                  <input type="text" name="doctorName" lay-verify="required" placeholder="请输入操作医生" autocomplete="off" class="layui-input" maxlength="18">
              </div>
          </div>


          <div class="layui-form-item" >
              <label class="layui-form-label">交班记录</label>
              <div class="layui-input-block">
                  <textarea  type="text" name="record"  placeholder="请填写交班记录" autocomplete="off" class="layui-textarea" id="edit"></textarea>
              </div>
          </div>




          <div class="layui-form-item" style="padding-left: 30px">
              <div class="layui-input-group">
                  <div class="layui-input-prefix" >
                      是否已谈方案
                  </div>
              <select name="planWhether" lay-verify="required">
                  <option value="" selected>请选择是否已谈方案</option>
                  <option value="是" th:selected="${plan?.planWhether=='是'}">是</option>
                  <option value="否" th:selected="${plan?.planWhether=='否'}">否</option>
              </select>
          </div>
        </div>

          <div class="layui-form-item" style="padding-left: 30px">
              <div class="layui-input-group">
                  <div class="layui-input-prefix" >
                      是否已签手术同意书
                  </div>
              <select name="planConsent" lay-verify="required">
                  <option value="" selected>请选择是否已签手术同意书</option>
                  <option value="是" th:selected="${plan?.planConsent=='是'}">是</option>
                  <option value="否" th:selected="${plan?.planConsent=='否'}">否</option>
              </select>
          </div>
        </div>

          <div class="layui-form-item" style="padding-left: 30px">
              <div class="layui-input-group">
                  <div class="layui-input-prefix" >
                      种植态度
                  </div>
                  <select name="planAttitude" lay-verify="required">
                      <option value="" selected>请选择种植态度</option>

                      <option value="问题多" th:selected="${plan?.planAttitude=='问题多'}">问题多</option>
                      <option value="在乎费用" th:selected="${plan?.planAttitude=='在乎费用'}">在乎费用</option>
                  </select>
          </div>
        </div>

        <div class="layui-form-item">

            <button class="layui-btn" lay-submit lay-filter="patientEditBasic">提交</button>
          </div>
        </div>

      </form>
    </div>

<script>

  layui.use(['form','tinymce'], function () {
    var form = layui.form;
    var $ = layui.$;
      var tinymce = layui.tinymce;
    // 监听提交按钮的点击事件
    form.on('submit(patientEditBasic)', function (data) {
      // 阻止表单的默认提交行为
      var event = window.event || arguments.callee.caller.arguments[0];
      event.preventDefault();
        // 获取富文本编辑器的内容
        var editorContent =  tinymce.get('#edit').getContent()


        // 将富文本内容添加到表单数据
        data.field.record = editorContent;
        if ( tinymce.get('#edit').getContent() === '') {
            layer.msg('交班记录不可为空', {icon: 5});
            return false;
        }
        var Message = {
            planWhether: data.field["planWhether"],
            planConsent:data.field["planConsent"],
            planAttitude:data.field["planAttitude"]
        };
        // 拼接发送到后端的数据
        var handoverRecord = {
            record: tinymce.get('#edit').getContent(),
            doctorName: data.field["doctorName"],
            recordDate: data.field["recordDate"],
            patientId: [[${patientId}]],
            stage: "plan",
            planMessage: Message
        }

        console.log(JSON.stringify(handoverRecord));
        $.ajax({
            url: '/patientManagement/handoverRecordEdit',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(handoverRecord),
            success: function (str) {
                layer.msg(str.msg,{icon:str.icon,anim:str.anim});
            },
            error: function (xhr, status, error) {
                console.error(error);
            }
        });
    });
  });
</script>

<script>
    //展开隐藏按钮函数
    function toggleFormVisibility(formId) {
        var form = document.getElementById(formId);
        if (form.style.display === "none" || form.style.display === "") {
            form.style.display = "block";
        } else {
            form.style.display = "none";
        }
    }

    // 提交表单的函数
    function submitForm(formId) {
        var form = document.getElementById(formId);
        var editorContent = tinymce.get('record-input' + formId).getContent(); // 获取富文本编辑器的内容
        var formData = new FormData(form);
        formData.append('record', editorContent); // 将富文本内容添加到表单数据
        $.ajax({
            url: '/patientManagement/patientPlanEdit',
            type: 'POST',
            data: formData,
            processData: false, // 防止jQuery处理数据
            contentType: false, // 防止jQuery设置Content-Type
            success: function (str) {
                layer.msg(str.msg, { icon: str.icon, anim: str.anim });
            }
        });
    }
    function createSelectElement(data, options, name, labelText) {
        // 创建标签的前缀
        var prefix = document.createElement("div");
        prefix.classList.add("layui-input-prefix");
        prefix.textContent = labelText;

        // 创建下拉框
        var select = document.createElement("select");
        select.name = name;
        select.setAttribute("lay-verify", "required");

        // 添加选项到下拉框，以及相应的数据绑定
        for (var i = 0; i < options.length; i++) {
            var option = document.createElement("option");
            option.textContent = options[i].text;
            option.value = options[i].value;
            if (data === options[i].value) {
                option.selected = true;
            }
            select.appendChild(option);
        }

        // 创建标签
        var label = document.createElement("div");
        label.appendChild(prefix);
        label.appendChild(select);

        return label;
    }
    function createInputField(data, name, labelText) {
        var inputDiv = document.createElement("div");
        inputDiv.classList.add("layui-input-group", "layui-form-item");
        inputDiv.style.paddingLeft = "30px";

        var prefix = document.createElement("div");
        prefix.classList.add("layui-input-prefix");
        prefix.textContent = labelText;

        var input = document.createElement("input");
        input.type = "text";
        input.name = name;
        input.value = data;
        input.id = name + "-input" + data.id;
        input.classList.add("layui-input");

        inputDiv.appendChild(prefix);
        inputDiv.appendChild(input);

        return inputDiv;
    }

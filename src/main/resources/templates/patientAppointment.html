<!DOCTYPE html>
<html lang="zh_CN" xmlns:th="http://www.thymeleaf.org">
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>患者预约板块</title>
    <link rel="stylesheet" th:href="@{/static/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/static/layui_exts/laydateNote/laydateNote.css}" media="all">
  </head>
  <body>
  <style>
      /* 新增的样式 */
      html, body {
          height: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden; /* 隐藏页面的滚动条 */
      }
      /* 整体容器样式 */
      .container {
          display: flex;
          height: 100%;
      }

      /* 左半部分容器样式 */
      .left-container {
          flex: 1;
          display: flex;
          flex-direction: column;
          width: 50%;
          /* 添加黑色边框样式 */
          /*border: 0.5px solid black;*/
      }

      /* 日历容器样式 */
      .calendar-container {
          padding-right: 18px;
          padding-left: 30px;
          flex: 1;
          z-index: 1;
      }

      /* 患者列表容器样式 */
      .patient-list-container {
          padding-top: 0px;
          flex: 1;
          margin-left: 0px;
          width: 900px;
          height: 200px;
      }

      /*时间段容器*/
      .button-groups-container {
          padding-top: 0px;
          flex:1;
          margin-bottom: 80px;
          flex-direction: column;
          padding-left: 30px;
      }
      #group1{
          padding-left: 10px;
      }
      #group2{
      }

      /* 右半部分容器样式 */
      .right-container {
          /* 设置为50%以实现右半部分在左半部分的正右方 */
          width: 55%;
          /* 调整间距以确保在左半部分正右方 */
          margin-left: 0;
          margin-right: 5px;
          /* 添加黑色边框样式 */
          /*border: 0.5px solid black;*/
      }

  </style>

    <!-- 你的HTML代码 -->
<div class="container">
    <div class="left-container" style="padding: 15px;">
        <!--日历容器-->
        <div class="calendar-container">
          <div class="layui-inline laydateNote" id="test-n2"></div>
        </div>
        <!-- 患者列表容器 -->
        <div class="patient-list-container">
                <div class="layui-fluid">
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md12">
                            <div class="layui-card">
                                <div class="layui-card-body">
                                    <!-- 患者列表内容 -->
                                    <table class="layui-hide" id="main-table" lay-filter="main-table"></table>
                                    <script type="text/html" id="toolbarDemo">
                                        <!-- ...（保留原有的代码） ... -->
                                        <div class="layui-inline" style="margin-right: 10px;">
                                            <input class="layui-input" name="patientname" id="parambyname" placeholder="根据患者姓名查询" autocomplete="off"
                                                   onkeydown="if(event.keyCode==13){layui.table.reload('table-load',{where:{patientname:this.value}});$('#parambyname').val(patientname);}">
                                        </div>
                                        <div class="layui-inline" style="margin-right: 10px;">
                                            <span class="layui-btn layui-btn-sm " lay-event="querySearchbyname">
                                            <i class="layui-icon">&#xe615;</i><span class="icon-text">查询1</span>
                                            </span>
                                        </div>

                                        <div class="layui-inline" style="margin-right: 10px;">
                                            <input class="layui-input" name="idcard" id="parambyidcard" placeholder="根据患者身份证号查询" autocomplete="off"
                                                   onkeydown="if(event.keyCode==13){layui.table.reload('table-load',{where:{idcard:this.value}});$('#parambyidcard').val(idcard);}">
                                        </div>
                                        <div class="layui-inline" style="margin-right: 10px;">
                                            <span class="layui-btn layui-btn-sm " lay-event="querySearchbyidcard">
                                            <i class="layui-icon">&#xe615;</i><span class="icon-text">查询2</span>
                                            </span>
                                        </div>
                                    </script>
                                    <script type="text/html" id="barDemo">
                                        <!-- ...（保留原有的代码） ... -->
                                        <a class="layui-btn layui-btn-xs" lay-event="select">选择</a>
                                    </script>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        <!-- 备注 -->
        <form class="layui-form layui-form-pane" action="form.html" style="padding-left: 30px;padding-right: 4px;margin-top:15px;flex: 1;">
            <div class="layui-form-item">
                <label class="layui-form-label">预约备注</label>
                <div class="layui-input-block" style="padding-right: 11px">
                    <input type="text" name="title" autocomplete="off" placeholder="请输入" lay-verify="required" class="layui-input">
                </div>
            </div>
        </form>
        <!--时间段容器 -->
        <div class="button-groups-container">
        <div class="layui-btn-group" id="group1">
                <button type="button" class="layui-btn layui-btn-primary  layui-btn-lg"> 上午 </button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">08:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">08:30</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">09:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">09:30</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">10:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">10:30</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">11:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">11:30</button>
            </div>
            <div class="layui-btn-group" id="group2">
                <button type="button" class="layui-btn layui-btn-primary  layui-btn-lg"> 下午 </button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">14:30</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">15:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">15:30</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">16:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">16:30</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">17:00</button>
                <button type="button" class="layui-btn layui-btn-primary layui-btn-lg">17:30</button>
            </div>
        </div>
        <!--预约按钮-->
        <button type="button" class="layui-btn" style="position: absolute; bottom: 20px; left: 25%; transform: translateX(-50%);">预约</button>
    </div>
    <div class="right-container">
        <div class="patient-list-container">
            <div class="layui-fluid">
                <div class="layui-row layui-col-space15">
                    <div class="layui-col-md12">
                        <div class="layui-card">
                            <div class="layui-card-body">
                                <!-- 预约内容 -->
                                <table class="layui-hide" id="appointment-table" lay-filter="main-table"></table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <script th:src="@{/static/layui/layui.js}"></script>
    <script>
      //调用
      layui
        .extend({
          laydateNote: '/static/layui_exts/laydateNote/laydateNoteES6',
          artTemplate: '/static/layui_exts/artTemplate/artTemplate'
        })
        .use(['laydateNote'], function() {
          //调用
          let { laydateNote } = layui
          laydateNote({
            elem: '#test-n2', //容器id,CLass
            //url: 'test2.json', //异步数据接口,本地浏览时可不设置
            sort: 'up', //日期排序，默认不设置不排序，up 日期升序，down 日期降序
            fine: '.laydateNotebook', //开启详细模式
            showBottom: false, // 设置为 false 来隐藏底部按钮
            done(data, chooseData, type) {
              //回调数据，这里发送你的请求ajax
              console.log(chooseData.time)
            }
          })
        })
    </script>
    <script>
        layui.use(['table','form'],function () {
            var $ = layui.$;
            var table = layui.table;
            table.render({
                elem: '#main-table',
                height: 178,
                url: '/patientManagement/patientQueryPage',
                method: 'POST',
                page: false,
                limit: 20, // 修改默认条数为3
                id: 'table-load',
                toolbar: '#toolbarDemo',
                cols: [
                    [
                        // {title: '序号', templet: '#indexTpl', width: 60, align: 'center'},
                        {field: 'patientname', title: '患者姓名', align: 'center', width: 100},
                        {field: 'idcard', title: '身份证', align: 'center', width: 200},
                        {field: 'sex', title: '性别', align: 'center', width: 80},
                        {field: 'profession', title: '手机号', align: 'center', width: 150},
                        {field: 'hospitalcode', title: '医院代码', align: 'center', width: 100},
                        {field: 'patientdoctor', title: '负责医生', align: 'center', width: 100},
                        // {field: 'patientlabel', title: '特殊患者标签', align: 'center', width: 200},
                        {title: '操作', align: 'center', toolbar: '#barDemo', fixed: 'right'}
                    ]
                ]
            });

            table.render({
                elem: '#appointment-table',
                height: 817,
                url: '/patientManagement/patientQueryPage',
                method: 'POST',
                page: false,
                limit: 20, // 修改默认条数为3
                id: 'table-load2',
                cols: [
                    [
                        {title: '序号', templet: '#indexTpl', width: 60, align: 'center'},
                        {field: 'appointmentTime', title: '预约时段', align: 'center', width: 100},
                        {field: 'patientname', title: '患者姓名', align: 'center', width: 100},
                        {field: 'sex', title: '性别', align: 'center', width: 60},
                        {field: 'idcard', title: '身份证', align: 'center', width: 180},
                        {field: 'profession', title: '手机号', align: 'center', width: 125},
                        {field: 'appointmentNote', title: '预约备注', align: 'center', width: 194},

                    ]
                ]
            });

            //监听头工具栏事件
            table.on('toolbar(main-table)',function (obj) {
                switch (obj.event) {
                    case 'querySearchbyname':
                        var param = $('#parambyname').val();
                        table.reload('table-load',{
                            where: {
                                patientname: param
                            }
                        });
                        $('#parambyname').val(param);
                        break;
                    case 'querySearchbyidcard':
                        var param = $('#parambyidcard').val();
                        table.reload('table-load',{
                            where: {
                                idcard: param
                            }
                        });
                        $('#parambyidcard').val(param);
                        break;
                }
            });

            //监听编辑、删除,查询患者问诊记录
            table.on('tool(main-table)',function (obj) {
                console.log(obj.data); // 查看当前行的数据对象内容
                var data = obj.data;
                switch (obj.event) {
                    case 'select':
                        console.log(obj.data); // 查看当前行的数据对象内容
                        var id = data.id;
                        var url = '?id='+id;
                        break;
                }
            });

        });

    </script>
  </body>
</html>

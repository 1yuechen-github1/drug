<!DOCTYPE html>
<html lang="zh_CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>口腔医生管理系统</title>
    <link rel="stylesheet" th:href="@{/static/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/static/admin/style.css}" media="all">
    <style>
        .small-footer {
            height: 30px; /* 自定义底部区域的高度，可以根据需要进行调整 */
            line-height: 30px; /* 设置高度值与行高相同，使文本垂直居中 */
            font-size: 12px; /* 可选：根据需要调整字体大小 */
        }
    </style>
</head>
<body class="layui-layout-body">
<!--顶部-->
<div class="layui-layout layui-layout-admin">
    <div class="layui-header">
        <div class="layui-logo">患者管理</div>
        <ul class="layui-nav layui-layout-right">
            <li class="layui-nav-item"><a href="/logout">退出系统</a> </li>
        </ul>
    </div>
    <!--左侧菜单-->
    <div class="layui-side layui-bg-black">
        <div class="layui-side-scroll">
            <ul class="layui-nav layui-nav-tree" lay-accordion="true">
<!--                <li class="layui-nav-item" id="patientArchiving">-->
<!--                    <a href="javascript:;" class="site-demo-active" lay-href="/patientManagement/patientArchiving" data-id="1" data-title="患者建档">患者建档</a>-->
<!--                </li>-->
                <li class="layui-nav-item" id="patientList">
                    <a href="javascript:;" class="site-demo-active" lay-href="/patientManagement/patientList" data-id="2" data-title="患者列表">患者列表</a>
                </li>
<!--                <li class="layui-nav-item" id="patientFilter">
                    <a href="javascript:;" class="site-demo-active" lay-href="/patientManagement/patientFilter" data-id="3" data-title="患者筛选">患者筛选</a>
                </li>-->
                <li class="layui-nav-item" id="patientAppointment">
                    <a href="javascript:;" class="site-demo-active" lay-href="/patientManagement/patientAppointment" data-id="4" data-title="患者预约">患者预约</a>
                </li>
                <li class="layui-nav-item" id="patientTest">
                    <a href="javascript:;" class="site-demo-active" lay-href="/patientManagement/test" data-id="5" data-title="测试模块">测试模块</a>
                </li>
            </ul>
        </div>
    </div>
    <!--主体部分-->
    <div class="layui-body">
        <div class="layui-tab" lay-filter="demo" lay-allowclose="true" style="margin: 0;">
            <ul class="layui-tab-title"></ul>
            <div class="layui-tab-content"></div>
        </div>
    </div>
    <!--底部区域-->
    <div class="layui-footer small-footer">
        患者管理 -- 底部固定区域
    </div>
</div>
<script th:src="@{/static/layui/layui.js}"></script>
<script>
    layui.use(['element','layer','jquery'],function () {
        var element = layui.element;
        var $ = layui.$;
        //左侧菜单树叶点击事件
        function openTab(dataid) {
            // 判断右侧是否有tab
            if ($(".layui-tab-title li[lay-id]").length <= 0) {
                // 没有tab，直接打开新的tab
                active.tabAdd(dataid.attr('lay-href'), dataid.attr('data-id'), dataid.attr('data-title'));
            } else {
                // 判断该tab项是否已经存在
                var isExist = false;
                $.each($(".layui-tab-title li[lay-id]"), function () {
                    // 如果点击左侧菜单栏传入的id在右侧tab项中的lay-id可以找到，说明该tab项已经打开
                    if ($(this).attr("lay-id") == dataid.attr("data-id")) {
                        isExist = true;
                    }
                });
                if (isExist == false) {
                    // 不存在当前id对应的tab，直接打开新的tab
                    active.tabAdd(dataid.attr('lay-href'), dataid.attr('data-id'), dataid.attr('data-title'));
                }
            }
            // 不管是不是新增了tab，最后都要转到要打开的选项页面
            active.tabChange(dataid.attr("data-id"));
        }

        $('.site-demo-active').on('click', function () {
            var dataid = $(this);
            openTab(dataid);
        });


        //配置active，绑定几项事件，后面可以用active调用这些事件
        var active = {
            //新增tab项
            //url是页面地址，id对应data-id,name对应标题
            tabAdd: function (url,id,name) {
                element.tabAdd('demo',{
                    title:name,
                    content:'<iframe data-frameid="'+id+'" scrolling="auto" frameborder="0" src="'+url+'" style="width:100%;height:870px;"></iframe>',
                    id:id
                });
            },
            //根据id切换到指定的tab
            tabChange: function (id) {
                element.tabChange('demo',id);
            },
            //关闭指定的tab
            tabDelete: function (id) {
                element.tabDelete('demo',id);
            }
        }
    });
</script>
</body>
</html>

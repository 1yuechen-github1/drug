<!DOCTYPE html>
<html lang="zh_CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>患者编辑</title>
    <link rel="stylesheet" th:href="@{/static/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/static/admin/style.css}" media="all">
    <style>
        .small-footer {
            height: 30px; /* 自定义底部区域的高度，可以根据需要进行调整 */
            line-height: 30px; /* 设置高度值与行高相同，使文本垂直居中 */
            font-size: 12px; /* 可选：根据需要调整字体大小 */
        }
    </style>
</head>
<body class="layui-layout-body">
<!--顶部-->
<div class="layui-layout layui-layout-admin">
    <div class="layui-header">
        <div class="layui-logo">患者编辑</div>
        <ul class="layui-nav layui-layout-right">
            <li class="layui-nav-item"><a href="/logout">退出系统</a> </li>
        </ul>
    </div>
    <!--左侧菜单-->
    <div class="layui-side layui-bg-black">
        <div class="layui-side-scroll">
            <ul class="layui-nav layui-nav-tree" lay-accordion="true">
                <li class="layui-nav-item" id="basicInf">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/basicInf?medicalrecordid=' + ${obj.id}}" data-id="1" data-title="基础信息">基础信息</a>
                </li>
                <li class="layui-nav-item" id="firstMedical">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/firstMedical?medicalrecordid=' + ${obj.id}}" data-id="2" data-title="初诊">初诊</a>
                </li>
                <li class="layui-nav-item" id="plan">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/plan?medicalrecordid=' + ${obj.id}}" data-id="3" data-title="谈方案">谈方案</a>
                </li>
                <li class="layui-nav-item" id="phaseI">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/phaseI?medicalrecordid=' + ${obj.id}}" data-id="4" data-title="种植1期">种植1期</a>
                </li>
                <li class="layui-nav-item" id="phaseII">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/phaseII?medicalrecordid=' + ${obj.id}}" data-id="5" data-title="种植2期">种植2期</a>
                </li>
                <li class="layui-nav-item" id="impression">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/impression?medicalrecordid=' + ${obj.id}}" data-id="6" data-title="取模">取模</a>
                </li>
                <li class="layui-nav-item" id="transit">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/transit?medicalrecordid=' + ${obj.id}}" data-id="7" data-title="过渡义齿">过渡义齿</a>
                </li>
                <li class="layui-nav-item" id="crown">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/crown?medicalrecordid=' + ${obj.id}}" data-id="8" data-title="戴牙">戴牙</a>
                </li>
                <li class="layui-nav-item" id="subsequent">
                    <a href="javascript:;" class="site-demo-active" th:attr="lay-href=@{'/patientManagement/subsequent?medicalrecordid=' + ${obj.id}}" data-id="9" data-title="戴牙后复诊">戴牙后复诊</a>
                </li>
            </ul>
        </div>
    </div>
    <!--主体部分-->
    <div class="layui-body">
        <div class="layui-tab" lay-filter="demo" lay-allowclose="true" style="margin: 0;">
            <ul class="layui-tab-title"></ul>
            <div class="layui-tab-content"></div>
        </div>
    </div>
    <!--底部区域-->
    <div class="layui-footer small-footer">
        患者编辑 -- 底部固定区域
    </div>
</div>
<script th:src="@{/static/layui/layui.js}"></script>
<script>
    // var medicalrecordid = [[${obj.id}]];


    layui.use(['element','layer','jquery'],function () {
        var element = layui.element;
        var $ = layui.$;
        //左侧菜单树叶点击事件
        function openTab(dataid) {

            // // 构建基础信息页面的URL
            // var href = dataid.attr('lay-href')  + medicalrecordid;

            // // 设置基础信息链接的href属性
            // dataid.attr('lay-href', href);
            // 判断右侧是否有tab
            if ($(".layui-tab-title li[lay-id]").length <= 0) {
                // 没有tab，直接打开新的tab
                active.tabAdd(dataid.attr('lay-href'), dataid.attr('data-id'), dataid.attr('data-title'));
            } else {
                // 判断该tab项是否已经存在
                var isExist = false;
                $.each($(".layui-tab-title li[lay-id]"), function () {
                    // 如果点击左侧菜单栏传入的id在右侧tab项中的lay-id可以找到，说明该tab项已经打开
                    if ($(this).attr("lay-id") == dataid.attr("data-id")) {
                        isExist = true;
                    }
                });
                if (isExist == false) {
                    // 不存在当前id对应的tab，直接打开新的tab
                    active.tabAdd(dataid.attr('lay-href'), dataid.attr('data-id'), dataid.attr('data-title'));
                }
            }
            // 不管是不是新增了tab，最后都要转到要打开的选项页面
            active.tabChange(dataid.attr("data-id"));
        }

        $('.site-demo-active').on('click', function () {
            var dataid = $(this);
            openTab(dataid);
        });


        //配置active，绑定几项事件，后面可以用active调用这些事件
        var active = {
            //新增tab项
            //url是页面地址，id对应data-id,name对应标题
            tabAdd: function (url,id,name) {
                element.tabAdd('demo',{
                    title:name,
                    content:'<iframe data-frameid="'+id+'" scrolling="auto" frameborder="0" src="'+url+'" style="width:100%;height:870px;"></iframe>',
                    id:id
                });
            },
            //根据id切换到指定的tab
            tabChange: function (id) {
                element.tabChange('demo',id);
            },
            //关闭指定的tab
            tabDelete: function (id) {
                element.tabDelete('demo',id);
            }
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh_CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>基本信息</title>
  <link rel="stylesheet" th:href="@{/static/layui/css/layui.css}" media="all">
  <link rel="stylesheet" th:href="@{/static/admin/style.css}" media="all">
  <style>
    .align-input {
      display: flex;
      align-items: center;
    }
    .align-input .layui-form-label {
      flex: 0 0 180px; /* 设置标签宽度 */
      text-align: -moz-center; /* 将标签内容对齐 */
    }
    .align-input .layui-input-block {
      flex: 1; /* 让输入框占据剩余的空间 */
      margin-left: 0px;
    }
  </style>
</head>
<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-body" style="padding: 15px;">
      <form class="layui-form layui-form-pane" action="">
        <input name="id" id="id-input" class="layui-input layui-hide" th:value="${subsequent?.id}"/>
        <input name="medicalRecordId" id="id-input2" class="layui-input layui-hide" th:value="${subsequent?.medicalRecordId}"/>
        <div class="layui-form-item align-input">
          <label class="layui-form-label">出诊记录</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentRecord" th:value="${subsequent?.subsequentRecord}" lay-verify="required" placeholder="就诊记录" autocomplete="off" class="layui-input" >
          </div>
        </div>

        <div class="layui-form-item align-input">
          <label class="layui-form-label">复诊症状</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentSymptom" th:value="${subsequent?.subsequentSymptom}" placeholder="" autocomplete="off" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item align-input">
          <label class="layui-form-label">日期</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentDate" th:value="${subsequent?.subsequentDate}" lay-verify="required" placeholder="" autocomplete="off" class="layui-input" id="birthdate-input">
          </div>
        </div>
        <div class="layui-form-item align-input">
          <label class="layui-form-label">咬合情况</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentOcclusal" th:value="${subsequent?.subsequentOcclusal}" lay-verify="required" placeholder="" autocomplete="off" class="layui-input">
          </div>
        </div>
        <div class="layui-form-item align-input">
          <label class="layui-form-label">处理</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentTreatment" th:value="${subsequent?.subsequentTreatment}" placeholder="" autocomplete="off" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item align-input">
          <label class="layui-form-label">是否拍取模CBCT</label>
          <div class="layui-input-block">
            <select name="subsequentCbct" lay-verify="required">
              <option th:value="${subsequent?.subsequentCbct}"></option>
              <option value="是" th:selected="${subsequent?.subsequentCbct=='是'}">是</option>
              <option value="否" th:selected="${subsequent?.subsequentCbct=='否'}">否
            </select>
          </div>
        </div>
        <div class="layui-form-item align-input">
          <label class="layui-form-label">是否拍取模小牙片</label>
          <div class="layui-input-block">
            <select name="subsequentApicalXray" lay-verify="required">
              <option th:value="${subsequent?.subsequentApicalXray}"></option>
              <option value="是" th:selected="${subsequent?.subsequentApicalXray=='是'}">是</option>
              <option value="否" th:selected="${subsequent?.subsequentApicalXray=='否'}">否
            </select>
          </div>
        </div>

        <div class="layui-form-item align-input">
          <label class="layui-form-label">是否拍取模全景片</label>
          <div class="layui-input-block">
            <select name="subsequentPanoramicXray" lay-verify="required">
              <option th:value="${subsequent?.subsequentPanoramicXray}"></option>
              <option value="是" th:selected="${subsequent?.subsequentPanoramicXray=='是'}">是</option>
              <option value="否" th:selected="${subsequent?.subsequentPanoramicXray=='否'}">否
            </select>
          </div>
        </div>

        <div class="layui-form-item align-input">
          <label class="layui-form-label">临床照片（多张）</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentClinicalPhoto" th:value="${subsequent?.subsequentClinicalPhoto}" placeholder="" autocomplete="off" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item align-input">
          <label class="layui-form-label">病历</label>
          <div class="layui-input-block">
            <input type="text" name="subsequentMedicalRecord" th:value="${subsequent?.subsequentMedicalRecord}" placeholder="" autocomplete="off" class="layui-input">

          </div>
        </div>


        <div class="layui-form-item">
          <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="patientEditBasic">提交</button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
<script th:src="@{/static/layui/layui.js}"></script>
<!--<script th:src="@{/static/layui/lay/modules/laydate.js}"></script>-->
<script>
  layui.use('laydate', function() {
    var laydate = layui.laydate;

    // 设置出生年月输入框的laydate
    laydate.render({
      elem: '#birthdate-input',
      type: 'date',
      trigger: 'click',  // 设置触发方式为点击文本
      //theme: '#393d49'
      // 如果需要，可以添加更多选项
    });
  });
</script>

<script>

  layui.use(['form'], function () {
    var form = layui.form;
    var $ = layui.$;

    // 监听提交按钮的点击事件
    form.on('submit(patientEditBasic)', function (data) {
      // 阻止表单的默认提交行为
      var event = window.event || arguments.callee.caller.arguments[0];
      event.preventDefault();

      var formData = data.field;
      $.ajax({
        url: '/patientManagement/patientSubsequentEdit',
        type: 'POST',
        data: formData,
        success: function (str) {
          layer.msg(str.msg,{icon:str.icon,anim:str.anim});
        }
      });
    });
  });
</script>


</body>
</html>
